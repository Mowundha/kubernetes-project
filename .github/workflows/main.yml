name: kubernetes-microservices

on:
  push:
    branches:
      - main

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    
    steps:
    - name: checkout code
      uses: actions/checkout@v3

    - name: login to docker hub
      run: echo "$ {{secrets.password}}" | docker login -u "${{secrets.username}}" --passowrd-stdin

    - name: Build docker image
      run: docker build -t ${{secrets.username}}/user-service-1.0 .

    - name: Push docker image
      run: docker push ${{secrets.username}}/user-service-1.0