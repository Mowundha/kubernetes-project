version: "3.9"

services:
  user-service:
    image: user-service:1.0
    container_name: user-service
    ports:
      - "8001:8001"

  product-service:
    image: product-service:1.0
    container_name: product-service
    ports:
      - "8003:8003"

  order-service:
    image: order-service:1.0
    container_name: order-service
    ports:
      - "8002:8002"
    depends_on:
      - user-service
      - product-service

