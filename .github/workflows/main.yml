name: kubernetes-microservices

on:
  push:
    branches:
      - main
  workflow_dispatch: 

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    
    steps:
    - name: checkout code
      uses: actions/checkout@v4

    - name: login to docker hub
      run: echo "$ {{secrets.PASSWORD}}" | docker login -u "${{secrets.USERNAME}}" --password-stdin

    - name: Build docker image
      run: docker build -t ${{secrets.USERNAME}}/user-service-1.0 ./user-service

    - name: Push docker image
      run: docker push ${{secrets.USERNAME}}/user-service-1.0

    # - name: Build docker image
